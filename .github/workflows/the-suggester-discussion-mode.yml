name: 💡 Copilot Suggester (Discussion Mode)

on:
  workflow_dispatch:
    inputs:
      suggestion_type:
        description: 'Type of suggestions to look for'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - security
          - performance
          - refactoring
          - testing
          - documentation
          - architecture
          - configuration
          - bugs
          - maintainability
          - ux-design
          - favicon
          - readme

jobs:
  suggest:
    permissions:
      contents: read
      discussions: write
    uses: fvalenzuela-dev/.github/.github/workflows/the-suggester-discussion-mode.yml@main
    with:
      suggestion_type: ${{ inputs.suggestion_type }}
    secrets:
      # Use GITHUB_TOKEN (automatically available, scoped to repo)
      # Only pass external secrets if absolutely required
      GH_PAT: ${{ GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
