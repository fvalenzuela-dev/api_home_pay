name: Central Validation

on:
  push:
    branches-ignore:
      - main
      - develop

jobs:
  verificar_version:
    name: Control de Versiones
    uses: fvalenzuela-dev/.github/.github/workflows/version-check-new.yml@main
    with:
      version_file: "VERSION"
      base_branch: "main"
    secrets:
      GITHUB_TOKEN_CUSTOM: ${{ secrets.GITHUB_TOKEN }}
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Convert coverage to lcov
        run: |
          go install github.com/jandelgado/gcov2lcov@latest
          mkdir -p coverage
          gcov2lcov -infile=coverage.out -outfile=coverage/lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 1

  codacy_coverage:
    name: Codacy Coverage
    needs: [build_and_test]
    uses: fvalenzuela-dev/.github/.github/workflows/codacy-coverage.yml@main
    with:
      coverage_report_path: "coverage/lcov.info"
    secrets:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
