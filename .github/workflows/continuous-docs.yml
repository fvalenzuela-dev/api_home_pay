name: 📚 Continuous Documentation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.java"
      - "**/*.cs"
      - "**/*.rb"
      - "**/*.rs"
      - "**/*.php"
      - "**/*.swift"
      - "**/*.kt"
      - "**/*.sh"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.json"

jobs:
  check-diff-size:
    name: 🔍 Check PR diff size
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check number of changed files
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json files --jq '.files | length')
          echo "Files changed: $count"
          if [ "$count" -gt 50 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  docs:
    needs: check-diff-size
    if: needs.check-diff-size.outputs.skip == 'false'
    permissions:
      contents: write
      pull-requests: write
    uses: fvalenzuela-dev/.github/.github/workflows/continuous-docs.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      pr_title: ${{ github.event.pull_request.title }}
      pr_author: ${{ github.event.pull_request.user.login }}
      base_ref: ${{ github.event.pull_request.base.ref }}
      head_ref: ${{ github.event.pull_request.head.ref }}
    secrets:
      # Pasa el secreto necesario (debes tenerlo configurado en el repo origenes o en la organización)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
