        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/models.Account'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar cuentas
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Crea una nueva cuenta dentro de una empresa
      parameters:
      - description: Company ID
        in: path
        name: companyID
        required: true
