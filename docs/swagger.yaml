      parameters:
      - description: Mes (1-12)
        in: query
        name: month
        type: integer
      - description: 'Año (ej: 2026)'
        in: query
        name: year
        type: integer
      - description: Filtrar por empresa
        in: query
        name: company_id
        type: string
      produces:
      - application/json
      responses:
