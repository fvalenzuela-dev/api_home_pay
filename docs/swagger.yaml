      billing_day:
        type: integer
      name:
        type: string
    type: object
  models.CreateBillingRequest:
    properties:
      amount_billed:
        type: number
      period:
        type: integer
    type: object
  models.CreateCategoryRequest:
    properties:
      name:
        type: string
    type: object
  models.CreateCompanyRequest:
    properties:
      category_id:
        type: integer
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  models.CreateExpenseRequest:
    properties:
      amount:
        type: number
      company_id:
        type: string
      description:
        type: string
      expense_date:
        type: string
    type: object
  models.CreateInstallmentRequest:
    properties:
      description:
        type: string
      start_date:
        type: string
      total_amount:
        type: number
      total_installments:
        type: integer
    type: object
  models.Expense:
    properties:
      amount:
        type: number
      auth_user_id:
        type: string
      company_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      expense_date:
        type: string
      id:
        type: string
    type: object
  models.InstallmentPayment:
    properties:
      amount:
        type: number
      created_at:
        type: string
      deleted_at:
        type: string
      due_date:
        type: string
      id:
        type: string
      installment_number:
        type: integer
      is_paid:
        type: boolean
      paid_at:
        type: string
      plan_id:
        type: string
    type: object
  models.InstallmentPlanWithPayments:
    properties:
      auth_user_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: string
      installments_paid:
        type: integer
      is_completed:
        type: boolean
      payments:
        items:
          $ref: '#/definitions/models.InstallmentPayment'
        type: array
      start_date:
        type: string
      total_amount:
        type: number
      total_installments:
        type: integer
    type: object
  models.UpdateAccountRequest:
    properties:
      auto_accumulate:
        type: boolean
      billing_day:
        type: integer
      name:
        type: string
    type: object
  models.UpdateBillingRequest:
    properties:
      amount_paid:
        type: number
    type: object
  models.UpdateCategoryRequest:
    properties:
      name:
        type: string
    type: object
  models.UpdateCompanyRequest:
    properties:
      category_id:
        type: integer
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  models.UpdateExpenseRequest:
    properties:
      amount:
        type: number
      company_id:
        type: string
      description:
        type: string
      expense_date:
        type: string
    type: object
  service.DashboardSummary:
    properties:
      expenses_by_company:
        additionalProperties:
          format: float64
          type: number
        type: object
      month:
        type: integer
      pending_commitments:
        items:
          $ref: '#/definitions/service.PendingCommitment'
        type: array
      total_billed:
        type: number
      total_expenses:
        type: number
      total_installments:
        type: number
      total_paid:
        type: number
      total_pending:
        type: number
      year:
        type: integer
    type: object
  service.PendingCommitment:
    properties:
      amount:
        type: number
      description:
        type: string
      type:
        type: string
    type: object
info:
  contact: {}
  description: Backend REST para gestión de finanzas personales HomePay. Todos los
    endpoints protegidos requieren un JWT de Clerk en el header Authorization.
  title: HomePay API
  version: "1.0"
paths:
  /accounts/{accountID}/billings:
    get:
      description: Retorna todas las facturas de una cuenta, ordenadas por año/mes
        desc
      parameters:
      - description: Account ID
        in: path
        name: accountID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/models.AccountBilling'
              type: array
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar facturas
      tags:
      - billings
    post:
      consumes:
      - application/json
      description: Registra la factura del mes para una cuenta. Si auto_accumulate=true
        y hay una factura impaga, se crea un carry-over automáticamente.
      parameters:
      - description: Account ID
        in: path
        name: accountID
        required: true
        type: string
      - description: Datos de la factura
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateBillingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              $ref: '#/definitions/models.AccountBilling'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Registrar factura
      tags:
      - billings
  /accounts/{accountID}/billings/{id}:
    get:
      description: Retorna una factura por ID
      parameters:
      - description: Account ID
        in: path
        name: accountID
        required: true
        type: string
      - description: Billing ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountBilling'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obtener factura
      tags:
      - billings
    put:
      consumes:
      - application/json
      description: Actualiza monto pagado. Si amount_paid >= amount_billed se marca
        automáticamente como pagada.
      parameters:
      - description: Account ID
        in: path
        name: accountID
        required: true
        type: string
      - description: Billing ID
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateBillingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/models.AccountBilling'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Actualizar factura
      tags:
      - billings
  /categories:
    get:
      description: Retorna las categorías activas del usuario autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Category'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar categorías
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Crea una nueva categoría para el usuario autenticado
      parameters:
      - description: Datos de la categoría
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear categoría
      tags:
      - categories
  /categories/{id}:
    delete:
      description: Soft delete de la categoría
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar categoría
      tags:
      - categories
    get:
      description: Retorna una categoría por ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obtener categoría
      tags:
      - categories
    put:
      consumes:
      - application/json
      description: Actualiza el nombre de una categoría
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Campos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Editar categoría
      tags:
      - categories
  /companies:
    get:
      description: Retorna todas las empresas activas del usuario autenticado
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
