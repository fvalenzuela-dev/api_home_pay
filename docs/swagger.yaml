  /dashboard:
    get:
      description: Retorna totales de facturas, gastos agrupados por categoría y cuotas
        del mes. Si no se pasan parámetros, usa el mes actual.
      parameters:
      - description: Mes (1-12)
        in: query
        name: month
        type: integer
      - description: 'Año (ej: 2026)'
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
