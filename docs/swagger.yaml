      deleted_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.Company:
    properties:
      auth_user_id:
        type: string
      category_id:
        type: integer
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  models.CreateAccountRequest:
    properties:
      auto_accumulate:
