basePath: /
definitions:
  models.Account:
    properties:
      account_number:
        type: string
      auto_accumulate:
        type: boolean
      billing_day:
        type: integer
      company_id:
        type: string
      company_name:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      group_id:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
    type: object
  models.AccountBilling:
    properties:
      account_id:
        type: string
      amount_billed:
        type: number
      amount_paid:
        type: number
      carried_from:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      is_paid:
        type: boolean
      paid_at:
        type: string
      period:
        type: integer
    type: object
  models.AccountGroup:
    properties:
      auth_user_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  models.Category:
    properties:
      auth_user_id:
        type: string
      color_apk:
        description: ColorApk is the hex color code or identifier used for the mobile
          (APK) platform.
        type: string
      color_web:
        description: ColorWeb is the hex color code or identifier used for the web
          platform.
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      icon_apk:
        description: IconApk is the identifier or resource name for the icon displayed
          on mobile (APK) platforms.
        type: string
      icon_web:
        description: IconWeb is the identifier or URL for the icon displayed on web
          platforms.
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.Company:
    properties:
      auth_user_id:
        type: string
      category_id:
        type: integer
      category_name:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  models.CreateAccountGroupRequest:
    properties:
      name:
        type: string
    type: object
  models.CreateAccountRequest:
    properties:
      account_number:
        type: string
      auto_accumulate:
        type: boolean
      billing_day:
        type: integer
      company_id:
        type: string
      group_id:
        type: string
      name:
        type: string
    type: object
  models.CreateBillingRequest:
    properties:
      account_id:
        description: requerido en top-level /billings, ignorado en nested
        type: string
      amount_billed:
        type: number
      amount_paid:
        description: opcional; si >= amount_billed se marca como pagada
        type: number
      carried_from:
        description: UUID de factura impaga anterior (carry-over manual)
        type: string
      is_paid:
        description: opcional; fuerza estado pagado
        type: boolean
      paid_at:
        description: opcional; fecha de pago
        type: string
      period:
        type: integer
    type: object
  models.CreateCategoryRequest:
    properties:
      color_apk:
        description: ColorApk is the hex color code or identifier used for the mobile
          (APK) platform.
        type: string
      color_web:
        description: ColorWeb is the hex color code or identifier used for the web
          platform.
        type: string
      icon_apk:
        description: IconApk is the identifier or resource name for the icon displayed
          on mobile (APK) platforms.
        type: string
      icon_web:
        description: IconWeb is the identifier or URL for the icon displayed on web
          platforms.
        type: string
      name:
        type: string
    type: object
  models.CreateCompanyRequest:
    properties:
      category_id:
        type: integer
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  models.CreateExpenseRequest:
    properties:
      amount:
        type: number
      company_id:
        type: string
      description:
        type: string
      expense_date:
        type: string
    type: object
  models.CreateInstallmentRequest:
    properties:
      description:
        type: string
      start_date:
        type: string
      total_amount:
        type: number
      total_installments:
        type: integer
    type: object
  models.Expense:
    properties:
      amount:
        type: number
      auth_user_id:
        type: string
      company_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      expense_date:
        type: string
      id:
        type: string
    type: object
  models.InstallmentPayment:
    properties:
      amount:
        type: number
      created_at:
        type: string
      deleted_at:
        type: string
      due_date:
        type: string
      id:
        type: string
      installment_number:
        type: integer
      is_paid:
        type: boolean
      paid_at:
        type: string
      plan_id:
        type: string
    type: object
  models.InstallmentPlanWithPayments:
    properties:
      auth_user_id:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: string
      installments_paid:
        type: integer
      is_completed:
        type: boolean
      payments:
        items:
          $ref: '#/definitions/models.InstallmentPayment'
        type: array
      start_date:
        type: string
      total_amount:
        type: number
      total_installments:
        type: integer
    type: object
  models.OpenPeriodResponse:
    properties:
      created:
        type: integer
      period:
        type: integer
      skipped:
        type: integer
    type: object
  models.UpdateAccountGroupRequest:
    properties:
      name:
        type: string
    type: object
  models.UpdateAccountRequest:
    properties:
      account_number:
        type: string
      auto_accumulate:
        type: boolean
      billing_day:
        type: integer
      company_id:
        type: string
      group_id:
        type: string
      name:
        type: string
    type: object
  models.UpdateBillingRequest:
    properties:
      amount_billed:
        type: number
      amount_paid:
        type: number
      is_paid:
        type: boolean
      paid_at:
        type: string
    type: object
  models.UpdateCategoryRequest:
    properties:
      color_apk:
        description: ColorApk is the hex color code or identifier used for the mobile
          (APK) platform.
        type: string
      color_web:
        description: ColorWeb is the hex color code or identifier used for the web
          platform.
        type: string
      icon_apk:
        description: IconApk is the identifier or resource name for the icon displayed
          on mobile (APK) platforms.
        type: string
      icon_web:
        description: IconWeb is the identifier or URL for the icon displayed on web
          platforms.
        type: string
      name:
        type: string
    type: object
  models.UpdateCompanyRequest:
    properties:
      category_id:
        type: integer
      name:
        type: string
      phone:
        type: string
      website:
        type: string
    type: object
  models.UpdateExpenseRequest:
    properties:
      amount:
        type: number
      company_id:
        type: string
      description:
        type: string
      expense_date:
        type: string
    type: object
  service.DashboardSummary:
    properties:
      expenses_by_company:
        additionalProperties:
          format: float64
          type: number
        type: object
      month:
        type: integer
      pending_commitments:
        items:
          $ref: '#/definitions/service.PendingCommitment'
        type: array
      total_billed:
        type: number
      total_expenses:
        type: number
      total_installments:
        type: number
      total_paid:
        type: number
      total_pending:
        type: number
      year:
        type: integer
    type: object
  service.PendingCommitment:
    properties:
      amount:
        type: number
      description:
        type: string
      type:
        type: string
    type: object
info:
  contact: {}
  description: Backend REST para gestión de finanzas personales HomePay. Todos los
    endpoints protegidos requieren un JWT de Clerk en el header Authorization.
  title: HomePay API
  version: ${VERSION}
paths:
  /account-groups:
    get:
      description: Retorna todos los grupos de cuentas del usuario autenticado (paginado)
      parameters:
      - description: 'Página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Resultados por página (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar grupos de cuentas
      tags:
      - account-groups
    post:
      consumes:
      - application/json
      description: Crea un nuevo grupo de cuentas para el usuario autenticado
      parameters:
      - description: Datos del grupo
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateAccountGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AccountGroup'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear grupo de cuentas
      tags:
      - account-groups
  /account-groups/{id}:
    delete:
      description: Soft delete de un grupo de cuentas
      parameters:
      - description: Account Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar grupo de cuentas
      tags:
      - account-groups
    get:
      description: Retorna un grupo de cuentas por ID
      parameters:
      - description: Account Group ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountGroup'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obtener grupo de cuentas
      tags:
      - account-groups
    put:
      consumes:
      - application/json
      description: Actualiza el nombre de un grupo de cuentas
      parameters:
      - description: Account Group ID
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAccountGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountGroup'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Editar grupo de cuentas
      tags:
      - account-groups
  /accounts:
    get:
      description: Retorna todas las cuentas del usuario (paginado, con filtros opcionales)
      parameters:
      - description: Filtrar por empresa
        in: query
        name: company_id
        type: string
      - description: Campo de orden (created_at, name, billing_day, company_name)
        in: query
        name: sort
        type: string
      - description: Dirección (asc, desc)
        in: query
        name: order
        type: string
      - description: 'Página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Resultados por página (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar cuentas
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Crea una nueva cuenta para una empresa
      parameters:
      - description: Datos de la cuenta (company_id requerido)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              $ref: '#/definitions/models.Account'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear cuenta
      tags:
      - accounts
  /accounts/{id}:
    delete:
      description: Soft delete de la cuenta. Propaga a sus facturas activas.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar cuenta
      tags:
      - accounts
    get:
      description: Retorna una cuenta por ID
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Account'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obtener cuenta
      tags:
      - accounts
    put:
      consumes:
      - application/json
      description: Actualiza nombre, billing_day o auto_accumulate de una cuenta
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/models.Account'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Editar cuenta
      tags:
      - accounts
  /billings:
    get:
      description: Retorna todas las facturas del usuario con filtros opcionales.
        Si no se pasa account_id, busca en todas las cuentas.
      parameters:
      - description: Filtrar por account ID
        in: query
        name: account_id
        type: string
      - description: Periodo inicio YYYYMM (inclusive)
        in: query
        name: from_period
        type: integer
      - description: Periodo fin YYYYMM (inclusive)
        in: query
        name: to_period
        type: integer
      - description: 'Filtrar por estado: true=pagadas, false=impagas'
        in: query
        name: is_paid
        type: boolean
      - description: 'Página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Resultados por página (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar todas las facturas
      tags:
      - billings
    post:
      consumes:
      - application/json
      description: Registra la factura del mes para una cuenta. Si auto_accumulate=true
        y hay una factura impaga, se crea un carry-over automáticamente.
      parameters:
      - description: Account ID (nested routes)
        in: path
        name: accountID
        type: string
      - description: Datos de la factura
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateBillingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              $ref: '#/definitions/models.AccountBilling'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Registrar factura
      tags:
      - billings
  /billings/{id}:
    delete:
      description: Realiza un soft-delete de una factura por ID.
      parameters:
      - description: Billing ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Eliminar factura
      tags:
      - billings
    get:
      description: Retorna una factura por ID
      parameters:
      - description: Account ID
        in: path
        name: accountID
        required: true
        type: string
      - description: Billing ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountBilling'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obtener factura
      tags:
      - billings
    put:
      consumes:
      - application/json
      description: Actualiza monto pagado. Si amount_paid >= amount_billed se marca
        automáticamente como pagada.
      parameters:
      - description: Account ID
        in: path
        name: accountID
        required: true
        type: string
      - description: Billing ID
        in: path
        name: id
        required: true
        type: string
      - description: Campos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateBillingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/models.AccountBilling'
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Actualizar factura
      tags:
      - billings
  /categories:
    get:
      description: Retorna las categorías activas del usuario autenticado (paginado)
      parameters:
      - description: 'Página (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Resultados por página (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar categorías
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Crea una nueva categoría para el usuario autenticado
      parameters:
      - description: Datos de la categoría
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Crear categoría
      tags:
      - categories
  /categories/{id}:
    delete:
      description: Soft delete de la categoría
      parameters:
      - description: Category ID
        in: path
